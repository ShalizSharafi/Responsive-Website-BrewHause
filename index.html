<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="stylesheet" href="stylesheet/out.css">
       <title>Document</title>
</head>
<body>
      
        <!-- header //////////////////////////////////////////////////////////////////// -->
        <header class="flex w-[90%] left-[5%] bg-darkgreen h-[60px] fixed top-[30px] md:w-[60%] md:left-[20%] lg:w-[40%] lg:left-[30%] z-20 rounded-4xl px-4">
              <nav class="h-full w-full">
                    <ul class="w-full hidden sm:flex sm:*:flex justify-between items-center h-full p-3">
                     <li class="items-center"><a href="" class="w-full py-1 px-3 rounded-3xl text-lightyellow text-[16px] font-light hover:bg-lightyellow hover:text-darkgreen duration-500 capitalize">menu</a></li>
                     <li class="items-center"><a href="" class="w-full py-1 px-3 rounded-3xl text-lightyellow text-[16px] font-light hover:bg-lightyellow hover:text-darkgreen duration-500 capitalize">locations</a></li>
                      <li class="group items-center overflow-hidden rounded-full bg-lightyellow relative h-[40px] w-[40px]"><a href="" class="w-[40px] h-[40px] flex  duration-500  justify-center items-center absolute top-0 left-0 group-hover:-top-[40px]">
                            <img src="images/logoImage.svg" alt="" class="object-cover h-3/4">
                      </a>
                     <a href="" class="w-[40px] h-[40px] flex  duration-500  justify-center items-center absolute top-[40px] left-0 group-hover:top-[0]">
                            <img src="images/logoImage.svg" alt="" class="object-cover h-3/4">
                      </a>
                     </li>
                     <li class="items-center"><a href="" class="w-full py-1 px-3 rounded-3xl text-lightyellow text-[16px] font-light hover:bg-lightyellow hover:text-darkgreen duration-500 capitalize">about Us</a></li>
                      <li class="items-center"><a href="" class="w-full py-1 px-3 rounded-3xl text-lightyellow text-[16px] font-light hover:bg-lightyellow hover:text-darkgreen duration-500 capitalize">news</a></li>
                    </ul>
                    <div class="flex w-full h-full sm:hidden justify-between items-center px-2">
                         <span class="group items-center overflow-hidden rounded-full bg-lightyellow relative h-[40px] w-[40px]"><a href="" class="w-[40px] h-[40px] flex  duration-500  justify-center items-center absolute top-0 left-0 group-hover:-top-[40px]">
                            <img src="images/logoImage.svg" alt="" class="object-cover h-3/4">
                      </a>
                     <a href="" class="w-[40px] h-[40px] flex  duration-500  justify-center items-center absolute top-[40px] left-0 group-hover:top-[0]">
                            <img src="images/logoImage.svg" alt="" class="object-cover h-3/4">
                      </a>
                     </span>
                     <span class="w-[40px] h-[40px] bg-lightyellow rounded-full flex justify-center items-center">
                             <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="white"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="darkgreen"
              class="size-7"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"
              ></path>
            </svg>
                     </span>
                    </div>
              </nav>
        </header>
        <!-- section 1 //////////////////////////////////////////////////////////////////// -->
         <section class="w-full bg-darkgreen">
              <div class="row justify-center pt-[150px]">
                     <h1>
                            life begins after coffee
                     </h1>
                     <p class="mb-10">
                            Because great coffe is the start of something even greater.
                     </p>
                     <div class="row justify-center items-center gap-5 px-4 md:px-0">
                            <a href="" class="link w-full md:w-auto bg-lightyellow text-darkgreen hover:bg-darkgreen hover:text-lightyellow border duration-500 border-lightyellow">
                                   <span>explore menu</span>
                            </a>
                            <a href="" class="link w-full md:w-auto border border-lightyellow">
                                   <span>our locations</span>
                            </a>
                     </div>
              </div>
              <div class="row justify-center px-10 overflow-hidden">
              <figure class=" hidden md:flex md:w-1/3 justify-end items-end">
              <img src="images/blackCoffe.png" alt="" class="object-cover md:translate-x-[100px] lg:translate-x-[150px] translate-y-[40px] -rotate-[10deg] md:scale-125 lg:scale-none">
              </figure>
              <figure class="w-full flex md:w-1/3 justify-center items-end">
              <img src="images/espresso.png" alt="" class="object-cover w-3/4 md:w-full md:scale-110 lg:scale-none  translate-y-[70px] sm:translate-y-[100px] relative z-2">
              </figure>
              <figure class="hidden md:flex md:w-1/3 justify-start items-end">
              <img src="images/coldBrew2.png" alt="" class="object-cover md:-translate-x-[100px] lg:-translate-x-[150px] translate-y-[40px] rotate-[10deg] md:scale-125 lg:scale-none ">
              </figure>
              </div>
